name: Remove custom domain

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  clear-custom-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Show current GitHub Pages config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" || true

      - name: Remove custom domain from GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"cname":null,"https_enforced":true,"build_type":"legacy","source":{"branch":"main","path":"/docs"}}'

      - name: Verify custom domain removed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response="$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages")"

          echo "$response"

          if echo "$response" | grep -i "chapterccdiinternship"; then
            echo "Custom domain still present."
            exit 1
          fi

          echo "Custom domain removed successfully."
